name: PR — Test

"on":
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          TERRAGRUNT_VERSION=0.99.4
          TG_BASE="https://github.com/gruntwork-io/terragrunt/releases/download"
          curl -sSL "${TG_BASE}/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Install TFLint
        run: |
          curl -sSL https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Install terraform-docs
        run: |
          curl -sSLo /tmp/terraform-docs.tar.gz \
            https://terraform-docs.io/dl/v0.19.0/terraform-docs-v0.19.0-linux-amd64.tar.gz
          tar -xzf /tmp/terraform-docs.tar.gz -C /usr/local/bin terraform-docs
          chmod +x /usr/local/bin/terraform-docs

      - name: Configure AWS credentials (test)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_DEPLOY_ROLE_TEST }}
          aws-region: eu-west-2
          role-session-name: GitHubActions-PreCommit-${{ github.run_id }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  deploy-test:
    name: Deploy to Test
    needs: pre-commit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (test)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_DEPLOY_ROLE_TEST }}
          aws-region: eu-west-2
          role-session-name: GitHubActions-Test-${{ github.run_id }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          TERRAGRUNT_VERSION=0.99.4
          TG_BASE="https://github.com/gruntwork-io/terragrunt/releases/download"
          curl -sSL "${TG_BASE}/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt plan (test)
        run: terragrunt run --all plan --non-interactive
        working-directory: accounts
        env:
          ENVIRONMENT: test

      - name: Terragrunt apply (test)
        run: terragrunt run --all apply --non-interactive
        working-directory: accounts
        env:
          ENVIRONMENT: test
